<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dairy & Eggs - FreshGro</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            background: linear-gradient(to right, rgba(228, 214, 178, 0.9), rgba(157, 159, 12, 0.9)),
                url('images/dairy-background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #333;
        }

        .dairy-container {
            padding: 40px;
            max-width: 1200px;
            margin: auto;
        }

        .dairy-heading {
            text-align: center;
            font-size: 2.5rem;
            color: #4a1c0d;
            margin-bottom: 30px;
            font-weight: bold;
            animation: slideFlow 2s ease-out;
            white-space: nowrap;
            overflow: hidden;
            text-shadow:
                3px 3px 0px rgba(0, 0, 0, 0.2),
                -3px -3px 5px rgba(255, 195, 0, 0.5),
                5px -5px 8px rgba(255, 255, 255, 0.3),
                -5px 5px 8px rgba(0, 0, 0, 0.1);
        }

        @keyframes slideFlow {
            0% {
                transform: translateX(-100%);
                opacity: 0;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .dairy-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        .dairy-item {
            background-color: #fffefa;
            border: 1px solid #ddd;
            border-radius: 12px;
            text-align: center;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .dairy-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .dairy-item h4 {
            margin-bottom: 5px;
            color: #13054b;
            font-size: 1.5rem;
        }

        .dairy-item p {
            margin-bottom: 10px;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            gap: 5px;
        }

        .qty-controls button {
            padding: 5px 10px;
            font-size: 16px;
            cursor: pointer;
            background-color: #635e06;
            color: white;
            border: none;
            border-radius: 6px;
        }

        .add-to-cart {
            margin-top: 10px;
            background-color:  #2a0e80;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }

        .add-to-cart:hover {
            background-color:  #080316;
        }

        .dairy-item:hover {
            animation: jump 0.6s ease;
        }

        @keyframes jump {
            0% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="dairy-container">
        <h2 class="dairy-heading">Welcome to Dairy & Eggs Shopping</h2>
        <div class="dairy-grid" id="dairyGrid">
            <!-- Items load here -->
        </div>
    </div>

    <script>
        const dairyItems = [
            { name: "Milk", price: "₹50 / liter", img: "images/milk.jpg" },
            { name: "Paneer", price: "₹80 / 200g", img: "images/paneer.jpg" },
            { name: "Cheese", price: "₹90 / 100g", img: "images/cheese.jpg" },
            { name: "Butter", price: "₹60 / 100g", img: "images/butter.jpg" },
            { name: "Curd", price: "₹30 / 500g", img: "images/curd.jpg" },
            { name: "Eggs", price: "₹60 / dozen", img: "images/white-eggs.jpg" },
            { name: "Ghee", price: "₹200 / 500ml", img: "images/ghee.jpg" },
            { name: "Cream", price: "₹90 / 250g", img: "images/freshcream.jpg" },
            { name: "Flavored Milk", price: "₹25 / 200ml", img: "images/flavored-milk.jpg" },
            { name: "Yogurt", price: "₹45 / 400g", img: "images/yogurt.jpg" },
            { name: "Egg Whites", price: "₹70 / 6 pcs", img: "images/egg-white.jpg" },
            { name: "Brown Eggs", price: "₹75 / dozen", img: "images/brown-eggs.jpg" },
            { name: "Organic Milk", price: "₹60 / liter", img: "images/organic-milk.jpg" },
            { name: "Mozzarella", price: "₹120 / 100g", img: "images/mozzarella.jpg" },
            { name: "Butter Milk", price: "₹20 / 500ml", img: "images/buttermilk.jpg" },
            { name: "Milk Powder", price: "₹150 / 500g", img: "images/milkpowder.jpg" },
            { name: "Cottage Cheese", price: "₹85 / 200g", img: "images/cottage-cheese.jpg" },
            { name: "Egg Mix", price: "₹50 / pack", img: "images/egg-mix.jpg" },
            { name: "Lassi", price: "₹30 / 300ml", img: "images/lassi.jpg" },
            { name: "Cream Cheese", price: "₹100 / 100g", img: "images/creamcheese.jpg" }
        ];

        const dairyGrid = document.getElementById("dairyGrid");

        dairyItems.forEach((item, index) => {
            const card = document.createElement("div");
            card.classList.add("dairy-item");
            card.innerHTML = `
                <img src="${item.img}" alt="${item.name}">
                <h4>${item.name}</h4>
                <p>${item.price}</p>
                <div class="qty-controls">
                    <button onclick="decrease(${index})">-</button>
                    <span id="qty-${index}">0</span>
                    <button onclick="increase(${index})">+</button>
                </div>
                <button class="add-to-cart" onclick="showQty(${index})">Add to Cart (<span id="cart-${index}">0</span>)</button>
            `;
            dairyGrid.appendChild(card);
        });

        const quantities = new Array(dairyItems.length).fill(0);

        function increase(i) {
            quantities[i]++;
            document.getElementById(`qty-${i}`).innerText = quantities[i];
        }

        function decrease(i) {
            if (quantities[i] > 0) {
                quantities[i]--;
                document.getElementById(`qty-${i}`).innerText = quantities[i];
            }
        }

        function showQty(i) {
            alert(`${dairyItems[i].name} quantity in cart: ${quantities[i]}`);
        }
    </script>
</body>

</html>

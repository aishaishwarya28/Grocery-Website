<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ice Creams - FreshGro</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: linear-gradient(to right, #b3628c, #37012a),
        url('images/icecreams-bg.jpg') no-repeat center center fixed;
      background-size: cover;
      color: #2c3e50;
    }

    .icecream-container {
      padding: 40px;
      max-width: 1200px;
      margin: auto;
    }

    .icecream-heading {
      text-align: center;
      font-size: 2.5rem;
      color: #006400;
      margin-bottom: 30px;
      font-weight: bold;
      animation: flowText 2s ease-out;
      white-space: nowrap;
      overflow: hidden;
      text-shadow:
        3px 3px 0px rgba(0, 0, 0, 0.2),
        -3px -3px 5px rgba(255, 255, 255, 0.5),
        5px -5px 8px rgba(0, 0, 0, 0.1);
    }

    @keyframes flowText {
      0% {
        transform: translateX(-100%);
        opacity: 0;
      }

      50% {
        opacity: 0.5;
      }

      100% {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .icecream-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
    }

    .icecream-item {
      background-color: #ffffffdd;
      border: 1px solid #ccc;
      border-radius: 12px;
      text-align: center;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .icecream-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .icecream-item h4 {
      margin-bottom: 5px;
      color: #008080;
      font-size: 1.5rem;
    }

    .icecream-item p {
      margin-bottom: 10px;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 10px;
      gap: 5px;
    }

    .qty-controls button {
      padding: 5px 10px;
      font-size: 16px;
      cursor: pointer;
      background-color: #808000;
      color: white;
      border: none;
      border-radius: 6px;
    }

    .add-to-cart {
      margin-top: 10px;
      background-color: #095b91;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
    }

    .add-to-cart:hover {
      background-color: #031125;
    }

    .icecream-item:hover {
      animation: floatItem 0.6s ease;
    }

    @keyframes floatItem {
      0% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }

      100% {
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>
  <div class="icecream-container">
    <h2 class="icecream-heading">Welcome to Ice Creams Shopping</h2>
    <div class="icecream-grid" id="icecreamGrid">
      <!-- Ice cream cards will be injected here -->
    </div>
  </div>

  <script>
    const icecreams = [
      { name: "Vanilla Scoop", price: "₹40", img: "images/vanilla.jpg" },
      { name: "Chocolate Cone", price: "₹50", img: "images/chocolate cone.jpg" },
      { name: "Strawberry Stick", price: "₹30", img: "images/strawberry stick.jpg" },
      { name: "Butterscotch", price: "₹45", img: "images/butterscotch.jpg" },
      { name: "Mango Sorbet", price: "₹60", img: "images/mango icecream.jpg" },
      { name: "Choco Chip", price: "₹55", img: "images/chocolatechip.jpg" },
      { name: "Black Currant", price: "₹60", img: "images/black currant.jpg" },
      { name: "Pista Scoop", price: "₹50", img: "images/pista.jpg" },
      { name: "Kulfi Stick", price: "₹40", img: "images/kulfi.jpg" },
      { name: "Cassata", price: "₹70", img: "images/cassata.jpg" },
      { name: "Fruit & Nut", price: "₹65", img: "images/fruitnut.jpg" },
      { name: "Choco Fudge", price: "₹75", img: "images/chocolate fudge icecream.jpg" },
      { name: "Raspberry Ripple", price: "₹60", img: "images/raspberry icecream.jpg" },
      { name: "Orange Masti", price: "₹30", img: "images/orange icecream.jpg" },
      { name: "Coffee Crunch", price: "₹55", img: "images/coffee icecream.jpg" },
      { name: "Triple Sundae", price: "₹80", img: "images/triple sundae icecream.jpg" },
      { name: "Blueberry Bliss", price: "₹65", img: "images/blueberry icecream.jpg" },
      { name: "Mint Magic", price: "₹60", img: "images/magic mint icecream.jpg" },
      { name: "Choco Lava", price: "₹70", img: "images/chocolava.jpg" },
      { name: "Caramel Swirl", price: "₹75", img: "images/caramel swirl.jpg" }
    ];

    const icecreamGrid = document.getElementById("icecreamGrid");

    icecreams.forEach((item, index) => {
      const card = document.createElement("div");
      card.classList.add("icecream-item");
      card.innerHTML = `
        <img src="${item.img}" alt="${item.name}">
        <h4>${item.name}</h4>
        <p>${item.price}</p>
        <div class="qty-controls">
          <button onclick="decrease(${index})">-</button>
          <span id="qty-${index}">0</span>
          <button onclick="increase(${index})">+</button>
        </div>
        <button class="add-to-cart" onclick="addToCart(${index})">
          Add to Cart (<span id="cart-${index}">0</span>)
        </button>
      `;
      icecreamGrid.appendChild(card);
    });

    const quantities = new Array(icecreams.length).fill(0);

    function increase(i) {
      quantities[i]++;
      document.getElementById(`qty-${i}`).innerText = quantities[i];
    }

    function decrease(i) {
      if (quantities[i] > 0) {
        quantities[i]--;
        document.getElementById(`qty-${i}`).innerText = quantities[i];
      }
    }

    function addToCart(i) {
      alert(`${icecreams[i].name} quantity in cart: ${quantities[i]}`);
    }
  </script>
</body>

</html>
